services:
  mysql:
    image: mysql:8.4
    container_name: denotary-db-agent-mysql-live
    command:
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: ledger
      MYSQL_USER: denotary
      MYSQL_PASSWORD: denotarypw
    ports:
      - "57306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u denotary -pdenotarypw --silent"]
      interval: 3s
      timeout: 3s
      retries: 30
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
