services:
  mariadb:
    image: mariadb:11.4
    container_name: denotary-db-agent-mariadb-live
    command:
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: ledger
      MARIADB_USER: denotary
      MARIADB_PASSWORD: denotarypw
    ports:
      - "57307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u denotary -pdenotarypw --silent"]
      interval: 3s
      timeout: 3s
      retries: 30
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
