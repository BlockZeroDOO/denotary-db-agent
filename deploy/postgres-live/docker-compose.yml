services:
  postgres:
    image: postgres:16-alpine
    container_name: denotary-db-agent-postgres-live
    environment:
      POSTGRES_USER: denotary
      POSTGRES_PASSWORD: denotarypw
      POSTGRES_DB: ledger
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U denotary -d ledger"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

